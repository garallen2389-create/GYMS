<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negocios Arboledas</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{max-width:900px;width:100%}
h1{text-align:center;font-size:1.8rem;font-weight:800;margin-bottom:.5rem}
.sub{text-align:center;color:#a1a1aa;font-size:.9rem;margin-bottom:2.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.25rem}
.card{background:#111;border:1px solid #27272a;border-radius:16px;padding:1.75rem;text-decoration:none;color:#fff;transition:transform .2s,border-color .2s;display:block}
.card:hover{transform:translateY(-4px);border-color:var(--c)}
.dot{width:12px;height:12px;border-radius:50%;background:var(--c);margin-bottom:1rem}
.tipo{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#a1a1aa;margin-bottom:.3rem}
.nombre{font-size:1.05rem;font-weight:700;margin-bottom:.3rem}
.dir{font-size:.78rem;color:#71717a}
.badge{display:inline-block;background:var(--c);color:#fff;font-size:.62rem;font-weight:700;padding:.15rem .5rem;border-radius:99px;margin-top:.75rem}
</style>
</head>
<body>
<div class="wrap">
<h1>Negocios Arboledas</h1>
<p class="sub">Calzada de los Jinetes · Tlalnepantla de Baz</p>
<div class="grid">
<a href="generated/body-trainer-arboledas.html" class="card" style="--c:#dc2626">
<div class="dot"></div><div class="tipo">Gimnasio</div>
<div class="nombre">Body Trainer Gym</div>
<div class="dir">Jinetes 35, Arboledas</div>
<span class="badge">🔥 Cliente activo</span>
</a>
<a href="generated/bufalo-barberia.html" class="card" style="--c:#92400e">
<div class="dot"></div><div class="tipo">Barbería</div>
<div class="nombre">Búfalo Barbería</div>
<div class="dir">Jinetes 141 L5</div>
<span class="badge">Prospecto</span>
</a>
<a href="generated/monte-cafe-arboledas.html" class="card" style="--c:#92400e">
<div class="dot"></div><div class="tipo">Café</div>
<div class="nombre">Monte Café</div>
<div class="dir">Jinetes 77, Arboledas</div>
<span class="badge">Prospecto</span>
</a>
<a href="generated/el-anafre-arboledas.html" class="card" style="--c:#7f1d1d">
<div class="dot"></div><div class="tipo">Restaurante</div>
<div class="nombre">El Anafre</div>
<div class="dir">Jinetes 35, Arboledas</div>
<span class="badge">Mismo edificio</span>
</a>
</div>
</div>
</body>
</html>
